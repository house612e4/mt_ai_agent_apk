name: Build iOS App (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync web assets into native project
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install

      - name: Build unsigned .app (no code signing)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package as unsigned IPA
        run: |
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r MtStudio-unsigned.ipa Payload
          mv MtStudio-unsigned.ipa $GITHUB_WORKSPACE/

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtstudio-ios-unsigned
          path: MtStudio-unsigned.ipa