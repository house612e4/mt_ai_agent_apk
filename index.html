<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Support Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: #1a1d2e;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2a2d3e;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; color: #fff; }
  .header h1 span { color: #4f8ef7; }
  .status-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #f44336;
    animation: pulse 2s infinite;
  }
  .dot.online { background: #4caf50; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* MAIN */
  .container { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* CARD */
  .card {
    background: #1a1d2e;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid #2a2d3e;
  }
  .card-title {
    font-size: 14px;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* CONNECT PANEL */
  .connect-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .connect-row input {
    flex: 1;
    background: #0f1117;
    border: 1px solid #2a2d3e;
    border-radius: 8px;
    padding: 10px 14px;
    color: #fff;
    font-size: 14px;
    outline: none;
  }
  .connect-row input:focus { border-color: #4f8ef7; }
  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #4f8ef7; color: #fff; }
  .btn-danger { background: #f44336; color: #fff; }
  .btn-success { background: #4caf50; color: #fff; }
  .btn-warning { background: #ff9800; color: #fff; }
  .btn-sm { padding: 8px 14px; font-size: 13px; }

  /* DEVICE INFO */
  .device-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .info-box {
    background: #0f1117;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .info-box .label { font-size: 11px; color: #666; margin-bottom: 4px; }
  .info-box .value { font-size: 15px; color: #fff; font-weight: 600; }

  /* REMOTE SCREEN */
  .screen-wrap {
    position: relative;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 9/16;
    cursor: crosshair;
    border: 2px solid #2a2d3e;
  }
  .screen-wrap.connected { border-color: #4caf50; }
  .screen-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #444;
    gap: 10px;
    font-size: 14px;
  }
  .screen-placeholder .icon { font-size: 40px; }
  .click-ripple {
    position: absolute;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(79, 142, 247, 0.6);
    transform: translate(-50%, -50%) scale(0);
    animation: ripple 0.5s ease-out forwards;
    pointer-events: none;
  }
  @keyframes ripple {
    to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
  }

  /* QUICK ACTIONS */
  .quick-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .quick-btn {
    background: #0f1117;
    border: 1px solid #2a2d3e;
    border-radius: 10px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    color: #e0e0e0;
  }
  .quick-btn:hover { background: #1e2235; border-color: #4f8ef7; }
  .quick-btn:active { transform: scale(0.96); }
  .quick-btn .qicon { font-size: 22px; margin-bottom: 6px; }
  .quick-btn .qlabel { font-size: 12px; color: #888; }

  /* LOG */
  .log-box {
    background: #0f1117;
    border-radius: 8px;
    padding: 12px;
    height: 140px;
    overflow-y: auto;
    font-size: 12px;
    font-family: monospace;
    color: #666;
  }
  .log-box .log-line { margin-bottom: 4px; }
  .log-box .log-line.success { color: #4caf50; }
  .log-box .log-line.error { color: #f44336; }
  .log-box .log-line.info { color: #4f8ef7; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1d2e;
    border: 1px solid #2a2d3e;
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* OFFLINE OVERLAY */
  .offline-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: #fff;
    font-size: 16px;
  }
  .offline-overlay.show { display: flex; }
  .offline-overlay .big { font-size: 48px; }
</style>
</head>
<body>

<div class="header">
  <h1>🌐 <span>Family</span> Support</h1>
  <div class="status-dot">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">অফলাইন</span>
  </div>
</div>

<div class="container">

  <!-- CONNECT -->
  <div class="card">
    <div class="card-title">🔗 সংযোগ</div>
    <div class="connect-row">
      <input type="text" id="serverUrl" placeholder="Server URL" value="https://mt-universal-hub.onrender.com">
      <button class="btn btn-primary" id="connectBtn" onclick="toggleConnect()">সংযুক্ত হন</button>
    </div>
  </div>

  <!-- DEVICE INFO -->
  <div class="card">
    <div class="card-title">📱 ডিভাইস তথ্য</div>
    <div class="device-info">
      <div class="info-box">
        <div class="label">স্ট্যাটাস</div>
        <div class="value" id="deviceStatus">—</div>
      </div>
      <div class="info-box">
        <div class="label">সংযোগ সময়</div>
        <div class="value" id="connTime">—</div>
      </div>
      <div class="info-box">
        <div class="label">ক্লিক পাঠানো</div>
        <div class="value" id="clickCount">0</div>
      </div>
      <div class="info-box">
        <div class="label">সেশন</div>
        <div class="value" id="sessionId">—</div>
      </div>
    </div>
  </div>

  <!-- REMOTE SCREEN -->
  <div class="card">
    <div class="card-title">🖥️ রিমোট কন্ট্রোল — ট্যাপ করুন</div>
    <div class="screen-wrap" id="screenWrap" onclick="handleScreenClick(event)">
      <div class="screen-placeholder" id="placeholder">
        <div class="icon">📵</div>
        <div>সংযুক্ত হলে এখানে ট্যাপ করুন</div>
      </div>
    </div>
    <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn btn-warning btn-sm" onclick="sendAction('back')">◀ ব্যাক</button>
      <button class="btn btn-warning btn-sm" onclick="sendAction('home')">⊙ হোম</button>
      <button class="btn btn-warning btn-sm" onclick="sendAction('recent')">▣ রিসেন্ট</button>
      <button class="btn btn-danger btn-sm" onclick="disconnect()" id="discBtn" style="margin-left:auto">সংযোগ বন্ধ</button>
    </div>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="card">
    <div class="card-title">⚡ দ্রুত কাজ</div>
    <div class="quick-grid">
      <div class="quick-btn" onclick="sendQuickClick(0.5, 0.5)">
        <div class="qicon">🎯</div>
        <div class="qlabel">মাঝখানে ক্লিক</div>
      </div>
      <div class="quick-btn" onclick="sendQuickClick(0.5, 0.1)">
        <div class="qicon">⬆️</div>
        <div class="qlabel">উপরে ক্লিক</div>
      </div>
      <div class="quick-btn" onclick="sendQuickClick(0.5, 0.9)">
        <div class="qicon">⬇️</div>
        <div class="qlabel">নিচে ক্লিক</div>
      </div>
      <div class="quick-btn" onclick="sendQuickClick(0.1, 0.5)">
        <div class="qicon">⬅️</div>
        <div class="qlabel">বাম ক্লিক</div>
      </div>
      <div class="quick-btn" onclick="sendQuickClick(0.9, 0.5)">
        <div class="qicon">➡️</div>
        <div class="qlabel">ডান ক্লিক</div>
      </div>
      <div class="quick-btn" onclick="sendQuickClick(0.9, 0.05)">
        <div class="qicon">🔔</div>
        <div class="qlabel">নোটিফিকেশন</div>
      </div>
    </div>
  </div>

  <!-- LOG -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <div class="card-title" style="margin:0">📋 লগ</div>
      <button class="btn btn-sm" style="background:#2a2d3e;color:#888" onclick="clearLog()">পরিষ্কার</button>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- OFFLINE OVERLAY -->
<div class="offline-overlay" id="offlineOverlay">
  <div class="big">📵</div>
  <div>ডিভাইস সংযুক্ত নেই</div>
  <button class="btn btn-primary" onclick="hideOverlay()">ঠিক আছে</button>
</div>

<script>
let socket = null;
let isConnected = false;
let clickCount = 0;
let connStartTime = null;
let timerInterval = null;
let sessionCounter = 1;

function log(msg, type = 'info') {
  const box = document.getElementById('logBox');
  const time = new Date().toLocaleTimeString('bn-BD');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = `[${time}] ${msg}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function clearLog() {
  document.getElementById('logBox').innerHTML = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function hideOverlay() {
  document.getElementById('offlineOverlay').classList.remove('show');
}

function updateStatus(online) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const deviceStatus = document.getElementById('deviceStatus');
  dot.className = 'dot' + (online ? ' online' : '');
  text.textContent = online ? 'অনলাইন' : 'অফলাইন';
  deviceStatus.textContent = online ? '✅ সক্রিয়' : '❌ নিষ্ক্রিয়';
  document.getElementById('screenWrap').className = 'screen-wrap' + (online ? ' connected' : '');
  document.getElementById('placeholder').style.display = online ? 'none' : 'flex';
}

function startTimer() {
  connStartTime = Date.now();
  timerInterval = setInterval(() => {
    const sec = Math.floor((Date.now() - connStartTime) / 1000);
    const m = Math.floor(sec / 60).toString().padStart(2, '0');
    const s = (sec % 60).toString().padStart(2, '0');
    document.getElementById('connTime').textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('connTime').textContent = '—';
}

function toggleConnect() {
  if (isConnected) {
    disconnect();
  } else {
    connect();
  }
}

function connect() {
  const url = document.getElementById('serverUrl').value.trim();
  if (!url) { showToast('❌ URL দিন'); return; }

  log('সংযোগ করার চেষ্টা হচ্ছে...', 'info');

  socket = io(url, {
    auth: { token: 'MT_STUDIO_2026' },
    transports: ['websocket', 'polling']
  });

  socket.on('connect', () => {
    isConnected = true;
    updateStatus(true);
    startTimer();
    const sid = socket.id ? socket.id.substring(0, 6) : 'S' + sessionCounter++;
    document.getElementById('sessionId').textContent = sid;
    document.getElementById('connectBtn').textContent = 'বিচ্ছিন্ন করুন';
    document.getElementById('connectBtn').className = 'btn btn-danger';
    log('✅ সার্ভারে সংযুক্ত হয়েছে', 'success');
    showToast('✅ সংযুক্ত হয়েছে');
  });

  socket.on('disconnect', () => {
    isConnected = false;
    updateStatus(false);
    stopTimer();
    document.getElementById('connectBtn').textContent = 'সংযুক্ত হন';
    document.getElementById('connectBtn').className = 'btn btn-primary';
    document.getElementById('sessionId').textContent = '—';
    log('❌ সংযোগ বিচ্ছিন্ন হয়েছে', 'error');
  });

  socket.on('connect_error', (err) => {
    log('⚠️ সংযোগ ত্রুটি: ' + err.message, 'error');
    showToast('⚠️ সংযোগ ব্যর্থ');
  });
}

function disconnect() {
  if (socket) {
    socket.disconnect();
    socket = null;
  }
  isConnected = false;
  updateStatus(false);
  stopTimer();
  document.getElementById('connectBtn').textContent = 'সংযুক্ত হন';
  document.getElementById('connectBtn').className = 'btn btn-primary';
}

function sendClick(x, y) {
  if (!isConnected || !socket) {
    document.getElementById('offlineOverlay').classList.add('show');
    return;
  }
  socket.emit('parent-send-command', { action: 'click', x, y });
  clickCount++;
  document.getElementById('clickCount').textContent = clickCount;
  log(`👆 ক্লিক পাঠানো → x:${x.toFixed(2)}, y:${y.toFixed(2)}`, 'success');
}

function handleScreenClick(e) {
  const wrap = document.getElementById('screenWrap');
  const rect = wrap.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;

  // ripple effect
  const ripple = document.createElement('div');
  ripple.className = 'click-ripple';
  ripple.style.left = (x * 100) + '%';
  ripple.style.top = (y * 100) + '%';
  wrap.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  sendClick(x, y);
}

function sendQuickClick(x, y) {
  sendClick(x, y);
  showToast(`👆 ক্লিক পাঠানো (${Math.round(x*100)}%, ${Math.round(y*100)}%)`);
}

function sendAction(action) {
  if (!isConnected || !socket) {
    document.getElementById('offlineOverlay').classList.add('show');
    return;
  }
  // Send special coordinates for system buttons
  const map = {
    back: { x: 0.15, y: 0.97 },
    home: { x: 0.5, y: 0.97 },
    recent: { x: 0.85, y: 0.97 }
  };
  const pos = map[action];
  if (pos) {
    socket.emit('parent-send-command', { action: 'click', x: pos.x, y: pos.y });
    log(`🔘 ${action} বাটন পাঠানো`, 'info');
    showToast(`🔘 ${action} পাঠানো`);
  }
}
</script>
</body>
</html>
